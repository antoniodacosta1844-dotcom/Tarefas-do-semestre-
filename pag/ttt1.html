<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de Média Escolar</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            width: 420px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        input{
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button{
            width: 100%;
            padding: 12px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: #0056b3;
        }

        #resultado{
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            background: #f8f7f8;
            line-height: 30px;
            font-size: 18px;
        }

        .aprovado{
            color: green;
            font-weight: bold;
        }

        .recurso{
            color: orange;
            font-weight: bold;
        }

        .reprovado{
            color: red;
            font-weight: bold;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Site de cálculo d média</h1>

        <input type="text" id="nome" placeholder="Nome do aluno">

        <input type="text" id="disciplina" placeholder="Disciplina">

        <input type="number" id="nota1" placeholder="Nota do 1º Trimestre">

        <input type="number" id="nota2" placeholder="Nota do 2º Trimestre">

        <input type="number" id="nota3" placeholder="Nota do 3º Trimestre">

        <button onclick="calcularMedia()">
            Calcular média
        </button>

        <div id="resultado">

        </div>

    </div>

    <script>

        function calcularMedia(){

            let nome = document.getElementById("nome").value;

            let disciplina = document.getElementById("disciplina").value;

            let nota1 = Number(document.getElementById("nota1").value);

            let nota2 = Number(document.getElementById("nota2").value);

            let nota3 = Number(document.getElementById("nota3").value);

            // VALIDAÇÃO
            if(
                nota1 < 0 || nota1 > 20 ||
                nota2 < 0 || nota2 > 20 ||
                nota3 < 0 || nota3 > 20
            ){

                alert("Não é possível inserir notas menores que 0 ou maiores que 20.");

                return;
            }

            // MÉDIA
            let media = (nota1 + nota2 + nota3) / 3;

            let situacao = "";

            let classe = "";

            // RESULTADO
            if(media >= 10 && media <= 20){

                situacao = "APROVADO";

                classe = "aprovado";
            }

            else if(media >= 8 && media <= 9){

                situacao = "RECURSO";

                classe = "recurso";
            }

            else if(media < 7 || media == 0){

                situacao = "REPROVADO";

                classe = "reprovado";
            }

            else{

                situacao = "FORA DO INTERVALO DEFINIDO";

                classe = "reprovado";
            }

            // EXIBIR RESULTADO
            document.getElementById("resultado").innerHTML = `

                <p><strong>Aluno:</strong> ${nome}</p>

                <p><strong>Disciplina:</strong> ${disciplina}</p>

                <p><strong>1º Trimestre:</strong> ${nota1}</p>

                <p><strong>2º Trimestre:</strong> ${nota2}</p>

                <p><strong>3º Trimestre:</strong> ${nota3}</p>

                <p><strong>Média:</strong> ${media.toFixed(1)}</p>

                <p>
                    <strong>Situação:</strong> 
                    <span class="${classe}">${situacao}</span>
                </p>

            `;
        }

    </script>

</body>
</html>
